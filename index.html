<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="ไอรา AI">
    <link rel="apple-touch-icon" href="icon.png.JPEG">
    <title>ไอรา AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; display: flex; flex-direction: column; }
        #header { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 14px 16px; text-align: center; color: white; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); }
        #chat-box { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
        .user { background: linear-gradient(135deg, #667eea, #764ba2); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color: white; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.2); }
        #input-area { display: flex; padding: 12px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); gap: 8px; border-top: 1px solid rgba(255,255,255,0.2); }
        #input { flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); font-size: 16px; outline: none; background: rgba(255,255,255,0.1); color: white; }
        #input::placeholder { color: rgba(255,255,255,0.5); }
        #send { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; flex-shrink: 0; }
        #clear { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a1a, #0d1b3e, #0a2a4a);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; color: white; overflow: hidden;
        }
        canvas#stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #loader-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; }
        #loader-title {
            font-size: 48px; font-weight: 900; letter-spacing: 8px;
            background: linear-gradient(135deg, #00d2ff, #7b2ff7, #ff6eb4);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px; text-transform: uppercase;
            animation: glow 2s ease-in-out infinite alternate;
        }
        #loader-subtitle { font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 4px; margin-bottom: 40px; }
        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #00d2ff); }
            to { filter: drop-shadow(0 0 25px #7b2ff7); }
        }
        #loader-bar-bg { width: 250px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 12px; }
        #loader-bar { height: 4px; background: linear-gradient(90deg, #00d2ff, #7b2ff7, #ff6eb4); border-radius: 10px; width: 0%; transition: width 0.15s; box-shadow: 0 0 10px #7b2ff7; }
        #loader-percent { font-size: 16px; font-weight: bold; color: #00d2ff; letter-spacing: 2px; }
    </style>
</head>
<body>
<div id="loader">
    <canvas id="stars"></canvas>
    <div id="loader-content">
        <div id="loader-title">DOWNLOAD</div>
        <div id="loader-subtitle">ไอรา AI • กำลังโหลด</div>
        <div id="loader-bar-bg"><div id="loader-bar"></div></div>
        <div id="loader-percent">0%</div>
    </div>
</div>

    <div id="header">
        ไอรา AI
        <button id="clear" style="float:right;margin-top:-2px;">ล้างประวัติ</button>
    </div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input id="input" type="text" placeholder="พิมพ์ข้อความ..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <button id="send" type="button">↑</button>
    </div>
    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const meteors = [];
        for (let i = 0; i < 60; i++) {
            meteors.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                len: Math.random() * 80 + 20,
                speed: Math.random() * 4 + 2,
                opacity: Math.random()
            });
        }
        function drawMeteors() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            meteors.forEach(m => {
                ctx.beginPath();
                ctx.moveTo(m.x, m.y);
                ctx.lineTo(m.x - m.len, m.y - m.len * 0.5);
                const grad = ctx.createLinearGradient(m.x, m.y, m.x - m.len, m.y - m.len * 0.5);
                grad.addColorStop(0, `rgba(0, 210, 255, ${m.opacity})`);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5;
                ctx.stroke();
                m.x += m.speed;
                m.y += m.speed * 0.5;
                if (m.x > canvas.width || m.y > canvas.height) {
                    m.x = Math.random() * canvas.width * 0.5;
                    m.y = Math.random() * canvas.height * 0.5;
                }
            });
            requestAnimationFrame(drawMeteors);
        }
        drawMeteors();

        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const clearBtn = document.getElementById('clear');
        let history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        function saveHistory() { localStorage.setItem('chat_history', JSON.stringify(history.slice(-50))); }
        function addMsg(text, role) {
            const div = document.createElement('div');
            div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        function loadHistory() {
            history.forEach(msg => addMsg(msg.content, msg.role === 'user' ? 'user' : 'ai'));
            if (history.length === 0) addMsg('สวัสดีค่ะ! หนูไอรา มีอะไรให้ช่วยมั้ยคะ?', 'ai');
        }
        clearBtn.addEventListener('click', () => {
            if (confirm('ล้างประวัติทั้งหมด?')) {
                history = [];
                localStorage.removeItem('chat_history');
                chatBox.innerHTML = '';
                addMsg('สวัสดีค่ะ! หนูไอรา มีอะไรให้ช่วยมั้ยคะ?', 'ai');
            }
        });
        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;
            input.value = '';
            addMsg(msg, 'user');
            history.push({ role: 'user', content: msg });
            saveHistory();
            addMsg('กำลังคิด...', 'ai');
            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, history })
                });
                const data = await res.json();
                chatBox.lastChild.textContent = data.response;
                history.push({ role: 'assistant', content: data.response });
                saveHistory();
            } catch(e) {
                chatBox.lastChild.textContent = '⚠️ เกิดข้อผิดพลาด กรุณาลองใหม่';
            }
        }
        sendBtn.addEventListener('touchend', function(e) { e.preventDefault(); sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(); });
        loadHistory();

        const loader = document.getElementById('loader');
        const bar = document.getElementById('loader-bar');
        const percent = document.getElementById('loader-percent');
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.random() * 8 + 3;
            if (progress >= 100) {
                progress = 100;
                bar.style.width = '100%';
                percent.textContent = '100%';
                clearInterval(interval);
                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.style.transition = 'opacity 0.8s';
                    setTimeout(() => loader.style.display = 'none', 800);
                }, 600);
            } else {
                bar.style.width = progress + '%';
                percent.textContent = Math.floor(progress) + '%';
            }
        }, 150);
    </script>
</body>
</html>
